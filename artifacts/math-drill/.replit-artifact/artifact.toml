kind = "mobile"
previewPath = "/"
title = "Math Speed Drill"
version = "1.0.0"
id = "artifacts/math-drill"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24511

[services.development]
run = "pnpm --filter @workspace/math-drill run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/math-drill", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/math-drill", "run", "serve" ]

[services.env]
PORT = "24511"
BASE_PATH = "/"
